<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeByGaurav - 404 page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arvo">
  
  <style>
    /* Original CSS */
    .page_404 { 
      padding: 40px 0; 
      background: #fff; 
      font-family: 'Arvo', serif;
      transition: filter 0.6s ease, opacity 0.6s ease; /* Transition for the blur effect */
    }

    .four_zero_four_bg {
      background-image: url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
      height: 280px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-position: center;
    }

    .four_zero_four_bg h1 {
      font-size: 80px;
    }

    .link_404 {			 
      color: #fff !important;
      padding: 10px 20px;
      background: #39ac31;
      margin: 20px 0;
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
    }

    .contant_box_404 { 
      margin-top: -50px;
    }

    /* Blur Transition Class */
    .fade-exit {
      filter: blur(15px);
      opacity: 0;
    }
  
    @media (max-width: 576px) {
      .four_zero_four_bg { height: 200px; }
      .four_zero_four_bg h1 { font-size: 60px; }
      .contant_box_404 h3 { font-size: 22px; }
      .link_404 { display: block; text-align: center; }
    }
</style>

    <!-- Global Mobile Fix -->
    <style>
      html { overflow-x: hidden; }
      body { overflow-x: hidden; }
      img { max-width: 100%; height: auto; }
      input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
    </style>
</head>
<body id="page-body">

<section class="page_404">
  <div class="container">
    <div class="row">	
      <div class="col-sm-12">
        <div class="col-sm-10 col-sm-offset-1 text-center">
          <div class="four_zero_four_bg">
            <h1 class="text-center">404</h1>
          </div>
          
          <div class="contant_box_404">
            <h3 class="h2">Look like you're lost</h3>
            <p>the page you are looking for not available!</p>
            <a id="home-btn" class="link_404">Go to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  document.getElementById('home-btn').addEventListener('click', function(e) {
    e.preventDefault(); // Stop immediate redirection
    
    // Apply the blur effect to the section
    document.querySelector('.page_404').classList.add('fade-exit');
    
    // Wait for the transition (600ms) before changing the URL
    setTimeout(function() {
      window.location.href = "home.html"; // Change this to your actual home URL
    }, 600);
  });
</script>
  
</body>
</html>
