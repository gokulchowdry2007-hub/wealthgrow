<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>WealthGrow | Private Wealth Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00261b",
                        "primary-container": "#0b3d2e",
                        "on-primary-container": "#79a894",
                        "on-tertiary-container": "#bd9953",
                        "tertiary-fixed": "#ffdea5",
                    },
                    fontFamily: {
                        "headline": ["Newsreader"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
    <style>
        .silk-gradient {
            background: linear-gradient(135deg, #00261b 0%, #0b3d2e 100%);
        }
        
        /* Blur Exit Animation */
        .exit-sequence {
            filter: blur(20px);
            opacity: 0;
            transform: scale(1.1);
            transition: all 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            pointer-events: none;
        }

        /* Shimmering Progress Bar */
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
        .progress-shimmer {
            animation: loading 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="font-body bg-primary overflow-hidden">

<main id="splash-container" class="relative h-screen w-full flex flex-col items-center justify-center silk-gradient transition-all duration-1000">
    <div class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]"></div>

    <div id="content-group" class="relative z-10 flex flex-col items-center space-y-12 opacity-0 translate-y-4">
        <div class="flex flex-col items-center space-y-8">
            <img alt="WealthGrow Logo" class="w-64 h-auto md:w-80 mix-blend-screen brightness-125" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAn8vmtuf6chIVMOxrn2xRQQlblQo7ibIo3wIhSpe9GSsy1pWYv7hGuIMOt2GLq9DUUL-oDQpt9QKQ2d4iZeDsf9coRSemzS6rpBZlpaovUh5N4DAIMozSF32uQplbvwleRTcjClMKXVm3qY7JqONFqMJ1NPm8cfc_BlYTLVszWIa4hv3b69rYN91fIt5HxrOE9GYcLJN8TxGrfEkK20gdH8R-k2VkNapGH2EyEICpcdtpJEtPfpHgzK-dRu7PGMOUO7eDH-CSO7rcS"/>
            <div class="flex flex-col items-center space-y-4">
                <div class="h-[1px] w-12 bg-on-tertiary-container opacity-40 mb-2"></div>
                <p class="font-label text-on-primary-container text-xs md:text-sm uppercase tracking-[0.3em] font-light">
                    The Private Digital Sanctuary
                </p>
            </div>
        </div>
    </div>

    <div id="footer-group" class="absolute bottom-16 w-full flex flex-col items-center space-y-8 opacity-0">
        <div class="w-48 h-[2px] bg-primary-container relative overflow-hidden">
            <div id="progress-fill" class="absolute h-full w-0 bg-on-tertiary-container transition-all duration-[3000ms] ease-out"></div>
            <div class="absolute h-full w-1/3 bg-white/20 progress-shimmer"></div>
        </div>

        <div class="flex items-center space-x-3 text-on-primary-container/60">
            <span class="material-symbols-outlined text-[18px]">verified_user</span>
            <span class="font-label text-[10px] uppercase tracking-widest">Secured by Legacy Protocol</span>
        </div>
    </div>

    <div class="absolute -top-1/4 -right-1/4 w-[800px] h-[800px] bg-on-tertiary-container/5 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-primary-container/20 rounded-full blur-[100px]"></div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('splash-container');
        const content = document.getElementById('content-group');
        const footer = document.getElementById('footer-group');
        const progress = document.getElementById('progress-fill');

        // 1. Entrance Sequence
        setTimeout(() => {
            content.style.opacity = '1';
            content.style.transform = 'translateY(0)';
            content.style.transition = 'all 1.2s ease-out';
            
            footer.style.opacity = '1';
            footer.style.transition = 'opacity 1s ease-out 0.5s';
        }, 300);

        // 2. Start Progress Bar
        setTimeout(() => {
            progress.style.width = '100%';
        }, 600);

        // 3. Exit and Redirect Sequence
        setTimeout(() => {
            // Apply blur and fade
            container.classList.add('exit-sequence');
            
            // Redirect after blur animation finishes
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1200);
        }, 4000); // Total splash duration
    });
</script>
</body>
</html>
